# SPA + same-origin API proxy. The web container serves the static bundle AND
# proxies /api/* to the api container, so the browser talks to one origin
# (import.favouritehub.in) — no CORS, and VITE_API_URL is just "/api" (no domain
# baked into the build, so a domain change never needs a rebuild).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Uploaded invoice PDFs/photos ride in JSON bodies to /api/ai/* and /api/files.
  client_max_body_size 30m;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  # Same-origin API: strip the /api prefix and forward to the api service. The
  # trailing slash on proxy_pass makes /api/files -> http://api:8787/files.
  location /api/ {
    proxy_pass http://api:8787/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Vite emits content-hashed files under /assets — safe to cache forever.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
