<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
        width: 320px;
        margin: 0;
        padding: 14px;
        background: #0e1726;
        color: #fff;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 2px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .logo {
        background: #e8a33d;
        color: #0e1726;
        border-radius: 8px;
        width: 26px;
        height: 26px;
        display: grid;
        place-items: center;
        font-weight: 800;
        font-size: 11px;
      }
      p.sub {
        margin: 0 0 12px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.55);
      }
      label {
        font-size: 10px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.6);
        display: block;
        margin: 8px 0 3px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 12px;
        outline: none;
      }
      button {
        width: 100%;
        margin-top: 12px;
        border: 0;
        border-radius: 999px;
        padding: 10px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        background: #e8a33d;
        color: #0e1726;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #result {
        margin-top: 10px;
        font-size: 12px;
        line-height: 1.45;
        border-radius: 8px;
        padding: 8px 10px;
        display: none;
      }
      #result.ok {
        display: block;
        background: rgba(22, 163, 74, 0.2);
        color: #7ee2a8;
      }
      #result.err {
        display: block;
        background: rgba(220, 58, 69, 0.2);
        color: #ff9aa2;
      }
      #settings {
        display: none;
      }
      a#toggle {
        color: rgba(255, 255, 255, 0.45);
        font-size: 10px;
        text-decoration: underline;
        cursor: pointer;
        display: inline-block;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h1><span class="logo">ID</span> Import Desk Tracker</h1>
    <p class="sub">Open a carrier tracking page, then send it — AI updates the matching shipment.</p>

    <div id="settings">
      <label>Server URL</label>
      <input id="server" placeholder="https://import.favouritehub.in" />
      <label>Team password</label>
      <input id="password" type="password" placeholder="Team password" />
    </div>

    <button id="send">Send this page to Import Desk</button>
    <div id="result"></div>
    <a id="toggle">settings</a>

    <script src="popup.js"></script>
  </body>
</html>
