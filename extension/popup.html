<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --navy: #0e1726;
        --amber: #e8a33d;
        --red: #ff8a93;
        --green: #7ee2a8;
      }
      body {
        font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
        width: 340px;
        margin: 0;
        background: var(--navy);
        color: #fff;
      }
      .head {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 14px 10px;
      }
      .logo {
        background: var(--amber);
        color: var(--navy);
        border-radius: 8px;
        width: 26px;
        height: 26px;
        display: grid;
        place-items: center;
        font-weight: 800;
        font-size: 11px;
        flex: none;
      }
      .head h1 {
        font-size: 13px;
        margin: 0;
        flex: 1;
      }
      #urgent {
        font-size: 10px;
        font-weight: 700;
        color: var(--red);
      }
      .pad {
        padding: 0 14px 12px;
      }
      button.primary {
        width: 100%;
        border: 0;
        border-radius: 999px;
        padding: 9px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        background: var(--amber);
        color: var(--navy);
      }
      button.primary:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #result {
        margin-top: 8px;
        font-size: 11px;
        line-height: 1.4;
        border-radius: 8px;
        padding: 7px 9px;
        display: none;
      }
      #result.ok {
        display: block;
        background: rgba(22, 163, 74, 0.2);
        color: var(--green);
      }
      #result.err {
        display: block;
        background: rgba(220, 58, 69, 0.2);
        color: var(--red);
      }
      #list {
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        max-height: 300px;
        overflow-y: auto;
      }
      .row {
        display: block;
        width: 100%;
        text-align: left;
        background: none;
        border: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        padding: 9px 14px;
        cursor: pointer;
        color: #fff;
      }
      .row:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .r1 {
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        flex: none;
      }
      .party {
        flex: 1;
        min-width: 0;
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .line {
        font-size: 10px;
        font-weight: 700;
        flex: none;
      }
      .r2 {
        margin: 3px 0 0 14px;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.55);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .mono {
        font-family: ui-monospace, Menlo, monospace;
      }
      #empty {
        padding: 18px 14px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.55);
        text-align: center;
      }
      .foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
      }
      .foot a {
        color: var(--amber);
        font-size: 11px;
        font-weight: 700;
        text-decoration: none;
      }
      a#toggle {
        color: rgba(255, 255, 255, 0.4);
        font-size: 10px;
        text-decoration: underline;
        cursor: pointer;
      }
      #settings {
        display: none;
        padding: 0 14px 10px;
      }
      #settings label {
        font-size: 10px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.6);
        display: block;
        margin: 8px 0 3px;
      }
      #settings input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        border-radius: 8px;
        padding: 7px 9px;
        font-size: 12px;
        outline: none;
      }
    </style>
  </head>
  <body>
    <div class="head">
      <span class="logo">ID</span>
      <h1>Import Desk</h1>
      <span id="urgent"></span>
    </div>

    <div id="settings">
      <label>Server URL</label>
      <input id="server" placeholder="https://import.favouritehub.in" />
      <label>Team password</label>
      <input id="password" type="password" placeholder="Team password" />
    </div>

    <div class="pad">
      <button id="send" class="primary">Send this page to Import Desk</button>
      <div id="result"></div>
    </div>

    <div id="list"></div>
    <div id="empty" style="display: none"></div>

    <div class="foot">
      <a id="open" href="#">Open Import Desk ↗</a>
      <a id="toggle">settings</a>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
