# Import Desk — one-click stack (Phase B: shared data).
#
#   docker compose up -d --build
#     → web (static SPA + /api proxy) + api (Fastify: AI + shared-data CRUD).
#
# Data: set DATABASE_URL to a Postgres and the app shares files across everyone;
# leave it blank and each browser keeps its own copy (IndexedDB). Auth: set
# APP_PASSWORD to gate the whole app behind one shared password; leave blank = open.
#
# Same-origin: the browser only ever talks to the WEB service; nginx proxies
# /api/* to the api container. So there's one public domain and no CORS, and
# VITE_API_URL is just "/api" (nothing domain-specific baked into the build).
#
# On Coolify: add a "Docker Compose" resource pointing at this repo, set the env
# below in the UI, map ONE domain to `web`, and join the api to the same network as
# your Postgres. Copy .env.example → .env for local runs.

services:
  web:
    build:
      context: ./app
      args:
        # Same-origin — relative path, so no domain is baked into the bundle.
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    ports:
      # Host 3005 by default (the reserved port on this Coolify box) → your nginx
      # forwards import.favouritehub.in to 127.0.0.1:3005. Override with WEB_PORT.
      - "${WEB_PORT:-3005}:80"
    depends_on:
      - api

  api:
    build:
      context: ./api
    restart: unless-stopped
    # Internal only — the web service reaches it at http://api:8787 via the proxy.
    expose:
      - "8787"
    environment:
      PORT: 8787
      # Same-origin in prod, so CORS is irrelevant; keep permissive for direct/dev use.
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      # Shared data (Postgres). Blank => app runs per-browser (IndexedDB).
      DATABASE_URL: ${DATABASE_URL:-}
      DATABASE_SSL: ${DATABASE_SSL:-}
      # Shared-password gate. Blank => open (no login).
      APP_PASSWORD: ${APP_PASSWORD:-}
      APP_SECRET: ${APP_SECRET:-}
      # AI providers (server-side only — never reach the browser).
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      AI_TEXT_PROVIDER: ${AI_TEXT_PROVIDER:-auto}
      N8N_REMINDER_WEBHOOK: ${N8N_REMINDER_WEBHOOK:-}
      APP_URL: ${APP_URL:-}
