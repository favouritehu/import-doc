# Import Desk — one-click stack.
#
#   Phase A (what's built today):   docker compose up -d --build
#       → web (static SPA) + api (Fastify, AI features). Data lives in the
#         browser; no database needed.
#
#   Phase B (when the API CRUD lands): docker compose --profile full up -d --build
#       → also starts MySQL (schema auto-loaded from db/schema.sql).
#
# On Coolify: add a "Docker Compose" resource pointing at this repo, set the
# env vars below in the Coolify UI, and map a domain to `web` and `api`.
# Coolify's Traefik handles HTTPS. Copy .env.example → .env for local runs.

services:
  web:
    build:
      context: ./app
      args:
        # Baked into the bundle at build time — set to the PUBLIC api URL in prod.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8787}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

  api:
    build:
      context: ./api
    restart: unless-stopped
    environment:
      PORT: 8787
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      AI_TEXT_PROVIDER: ${AI_TEXT_PROVIDER:-auto}
      N8N_REMINDER_WEBHOOK: ${N8N_REMINDER_WEBHOOK:-}
      APP_URL: ${APP_URL:-}
      # Phase B (ignored until the API uses MySQL):
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-import_desk}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-import_desk}
    ports:
      - "${API_PORT:-8787}:8787"

  # Phase B database — opt-in. Not started in Phase A (profile gate).
  db:
    image: mysql:8.0
    profiles: ["full"]
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-import_desk}
      MYSQL_USER: ${MYSQL_USER:-import_desk}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
    volumes:
      - import_desk_db:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  import_desk_db:
